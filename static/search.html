<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moogle Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #007aff;
      --blue2:  #0068e1;
      --text:   #1c1c1e;
      --muted:  #636366;
      --border: rgba(0,0,0,0.10);
      --card:   #ffffff;
      --bg:     #f2f2f7;
      --tag-bg: rgba(0,122,255,0.10);
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      font-size: 13px;
    }

    /* ── Hero / centered stage ─────────────────────────────────────── */
    #stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px;
      transition: padding 0.35s ease, margin 0.35s ease;
    }

    body.idle #stage {
      justify-content: center;
      flex: 1;
      padding-top: 0;
      margin-top: -60px; /* optical center */
    }

    body.active #stage {
      padding-top: 28px;
      padding-bottom: 20px;
      background: white;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }

    /* ── Logo ──────────────────────────────────────────────────────── */
    .logo {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 28px;
      user-select: none;
      transition: font-size 0.35s ease, margin-bottom 0.35s ease;
    }

    body.active .logo {
      font-size: 1.6rem;
      margin-bottom: 14px;
    }

    .logo-dark  { color: var(--text); }
    .logo-blue  { color: var(--blue); }

    /* ── Search bar ────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 620px;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.15rem;
      color: var(--muted);
      pointer-events: none;
    }

    #q {
      width: 100%;
      padding: 14px 48px 14px 50px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 50px;
      outline: none;
      background: white;
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    #q:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.18), 0 1px 4px rgba(0,0,0,.08);
    }

    body.active #q {
      padding: 12px 44px 12px 46px;
      font-size: 0.97rem;
    }

    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--muted);
      display: none;
      line-height: 1;
      padding: 4px;
      border-radius: 50%;
    }
    .clear-btn:hover { color: var(--text); background: var(--tag-bg); }
    .clear-btn.visible { display: block; }

    /* ── Results area ──────────────────────────────────────────────── */
    #results {
      width: 100%;
      max-width: 720px;
      margin: 28px auto 60px;
      padding: 0 16px;
      display: none;
    }
    body.active #results { display: block; }

    /* ── Status / spinner ──────────────────────────────────────────── */
    #status {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section headings ──────────────────────────────────────────── */
    .section-heading {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 10px;
    }
    .section-heading:first-child { margin-top: 0; }

    /* ── Result cards ──────────────────────────────────────────────── */
    .result-card {
      display: flex;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 6px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .result-card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,.10);
      border-color: var(--blue);
      transform: translateY(-1px);
    }

    .card-icon {
      font-size: 1.3rem;
      margin-right: 14px;
      flex-shrink: 0;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-name {
      font-weight: 600;
      font-size: 0.97rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--blue);
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 8px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .card-arrow {
      font-size: 1rem;
      color: var(--muted);
      margin-left: 12px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .result-card:hover .card-arrow { color: var(--blue); }

    /* ── No results ────────────────────────────────────────────────── */
    .no-results {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
    }
    .no-results .nr-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .no-results .nr-msg  { font-size: 1rem; }
  </style>
</head>
<body class="idle">

  <a href="/" style="position:fixed;top:14px;right:16px;z-index:100;padding:5px 14px;background:#007aff;color:#fff;border-radius:6px;font-size:0.76rem;font-weight:500;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;box-shadow:0 1px 3px rgba(0,0,0,.15);-webkit-font-smoothing:antialiased;">Account View</a>

  <div id="stage">
    <div class="logo">
      <span class="logo-dark">Moogle</span><span class="logo-blue">Search</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="q" type="text" placeholder="Search accounts, contacts, dealer IDs…"
             autocomplete="off" spellcheck="false" />
      <button class="clear-btn" id="clearBtn" title="Clear">✕</button>
    </div>
  </div>

  <div id="results">
    <div id="status"></div>
    <div id="cards"></div>
  </div>

  <script>
    const input   = document.getElementById('q');
    const clearBtn = document.getElementById('clearBtn');
    const status  = document.getElementById('status');
    const cards   = document.getElementById('cards');
    const results = document.getElementById('results');
    let debounce;

    // ── Input handling ──────────────────────────────────────────────
    input.addEventListener('input', () => {
      clearBtn.classList.toggle('visible', input.value.length > 0);
      clearTimeout(debounce);
      if (!input.value.trim()) { reset(); return; }
      debounce = setTimeout(doSearch, 320);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { clearTimeout(debounce); doSearch(); }
      if (e.key === 'Escape') { clearAll(); }
    });

    clearBtn.addEventListener('click', clearAll);

    function clearAll() {
      input.value = '';
      clearBtn.classList.remove('visible');
      reset();
      input.focus();
    }

    function reset() {
      document.body.className = 'idle';
      cards.innerHTML = '';
      status.innerHTML = '';
      const existingExport = document.getElementById('export-btn');
      if (existingExport) existingExport.remove();
    }

    // ── Search ──────────────────────────────────────────────────────
    async function doSearch() {
      const q = input.value.trim();
      if (!q) { reset(); return; }

      document.body.className = 'active';
      cards.innerHTML = '';
      status.innerHTML = '<span class="spinner"></span> Searching…';

      try {
        const res  = await fetch(`/api/global-search?q=${encodeURIComponent(q)}`);
        if (!res.ok) {
          status.innerHTML = `⚠️ Search error (${res.status}) — please refresh and try again.`;
          return;
        }
        const data = await res.json();
        renderResults(data);
      } catch (err) {
        status.innerHTML = '⚠️ Search failed — is the server running?';
      }
    }

    // ── Render ──────────────────────────────────────────────────────
    function renderResults(data) {
      const accounts = data.accounts || [];
      const contacts = data.contacts || [];
      const slps     = data.slps     || [];
      const total    = data.total    || 0;

      status.innerHTML = '';
      cards.innerHTML  = '';

      // Show export button if there are results
      const existingExport = document.getElementById('export-btn');
      if (existingExport) existingExport.remove();
      if (total > 0) {
        const btn = document.createElement('button');
        btn.id = 'export-btn';
        btn.textContent = '⬇ Export CSV';
        btn.style.cssText = 'display:block;margin:0 0 16px auto;padding:7px 14px;font-size:0.82rem;background:#059669;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;';
        btn.onclick = () => {
          window.location.href = `/api/global-search/export?q=${encodeURIComponent(input.value.trim())}`;
        };
        cards.appendChild(btn);
      }

      if (total === 0) {
        if (data.index_loading) {
          cards.innerHTML = `
            <div class="no-results">
              <div class="nr-icon">⏳</div>
              <div class="nr-msg">Search index is still loading after server restart.<br>
              Please wait 10–15 seconds and try again.</div>
            </div>`;
        } else {
          cards.innerHTML = `
            <div class="no-results">
              <div class="nr-icon">🔍</div>
              <div class="nr-msg">No results for <strong>${esc(data.query)}</strong></div>
            </div>`;
        }
        return;
      }

      // ── Accounts ──
      if (accounts.length) {
        cards.insertAdjacentHTML('beforeend', '<div class="section-heading">Accounts</div>');
        accounts.forEach(a => {
          const name    = (a.name || '').trim() || '(unnamed)';
          const sub     = a.dealer_id ? `Dealer ID ${a.dealer_id}` : '';
          const tag     = a.matched_on === 'dealer id' ? 'dealer id' :
                          a.matched_on === 'contact'   ? 'via contact' : '';
          const url     = a.account_url || '#';
          cards.insertAdjacentHTML('beforeend', card('🏢', name, sub, tag, url));
        });
      }

      // ── Contacts ──
      if (contacts.length) {
        cards.insertAdjacentHTML('beforeend', '<div class="section-heading">Contacts</div>');
        contacts.forEach(c => {
          const name = c.name || '(no name)';
          const sub  = c.email || '';
          const url  = c.contact_url || '#';   // link directly to contact in AC
          cards.insertAdjacentHTML('beforeend', card('👤', name, sub, '', url));
        });
      }

      // ── SLPs — link to associated account ──
      if (slps.length) {
        cards.insertAdjacentHTML('beforeend', '<div class="section-heading">SLP Records</div>');
        slps.forEach(s => {
          const name = s.dealer_id ? `Dealer ID ${s.dealer_id}` : s.record_id;
          const sub  = s.platform ? `Platform: ${s.platform}` : '';
          const url  = s.account_url || '#';   // always the account, not the SLP
          cards.insertAdjacentHTML('beforeend', card('📋', name, sub, 'slp', url));
        });
      }
    }

    function card(icon, name, sub, tag, url) {
      return `
        <a class="result-card" href="${esc(url)}" target="_blank" rel="noopener">
          <span class="card-icon">${icon}</span>
          <div class="card-body">
            <div class="card-name">${esc(name)}${tag ? `<span class="card-tag">${esc(tag)}</span>` : ''}</div>
            ${sub ? `<div class="card-sub">${esc(sub)}</div>` : ''}
          </div>
          <span class="card-arrow">↗</span>
        </a>`;
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
