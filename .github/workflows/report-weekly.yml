name: Weekly Reports

on:
  schedule:
    - cron: '5 12 * * 1'   # 7:05 AM ET (UTC-5) Monday
  workflow_dispatch:         # allow manual trigger from GitHub Actions tab

jobs:
  license-expiration:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger license expiration report
        run: |
          curl -f --max-time 120 \
            -u "${{ secrets.APP_USER }}:${{ secrets.APP_PASS }}" \
            "https://microf-search.onrender.com/api/send-report/license-expiration"

  bdr-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger BDR summary report
        run: |
          curl -f --max-time 120 \
            -u "${{ secrets.APP_USER }}:${{ secrets.APP_PASS }}" \
            "https://microf-search.onrender.com/api/send-report/bdr-summary"
