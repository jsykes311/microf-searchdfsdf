name: Daily Activations Report

on:
  schedule:
    - cron: '0 12 * * 1-5'   # Mon–Fri 7:00am ET (12:00 UTC)
  workflow_dispatch:

jobs:
  send-activations:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger activations report
        run: |
          curl -f --max-time 120 \
            -u "${{ secrets.APP_USER }}:${{ secrets.APP_PASS }}" \
            "https://microf-search.onrender.com/api/send-report/activations"
