name: Monthly Reports

on:
  workflow_dispatch:   # manual trigger only — run from GitHub Actions tab

jobs:
  stale-untrained:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger stale/untrained dealers report
        run: |
          curl -f --max-time 180 \
            -u "${{ secrets.APP_USER }}:${{ secrets.APP_PASS }}" \
            "https://microf-search.onrender.com/api/send-report/stale-untrained"

  partner-activation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger partner activation report
        run: |
          curl -f --max-time 120 \
            -u "${{ secrets.APP_USER }}:${{ secrets.APP_PASS }}" \
            "https://microf-search.onrender.com/api/send-report/partner-activation?preset=last_month"
